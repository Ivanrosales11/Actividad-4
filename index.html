<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./formulario.css" />
    <title>Actividad 4</title>
  </head>

  <body>
    <main>
      <header>
        <h1>Formulario de Registro</h1>
      </header>

      <form action="resultado.html" method="GET">
        <div class="form-group">
          <label for="nombre" class="form-label">Nombre:</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ingresa tu nombre"
          />
          <span id="error-nombre" class="error-mensaje"></span>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="ejemplo@correo.com"
          />
          <span id="error-email" class="error-mensaje"></span>
        </div>

        <div class="form-group">
          <label for="edad" class="form-label">Edad:</label>
          <input
            type="number"
            id="edad"
            name="edad"
            placeholder="Entre 18 y 60"
          />
          <span id="error-edad" class="error-mensaje"></span>
        </div>

        <div class="form-group">
          <label for="pais" class="form-label">País:</label>
          <select id="pais" name="pais">
            <option value="">Seleccione un país</option>
            <option value="Argentina">Argentina</option>
            <option value="Uruguay">Uruguay</option>
            <option value="Brasil">Brasil</option>
            <option value="Chile">Chile</option>
            <option value="Paraguay">Paraguay</option>
          </select>
          <span id="error-pais" class="error-mensaje"></span>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terminos" />
          <label for="terminos">Acepto los términos y condiciones</label>
          <span id="error-terminos" class="error-mensaje"></span>
        </div>
        <button type="submit">Enviar</button>
      </form>
    </main>

    <script type="module" src="./formulario.js"></script>
  </body>
</html>
